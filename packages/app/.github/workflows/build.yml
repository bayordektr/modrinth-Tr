name: Build Desktop App
on:
  workflow_dispatch: # GitHub sitesinden "Run workflow" diyerek elle başlatabilmemiz için

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install

      - name: Build Application
        run: pnpm app:build

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Modrinth-Launcher-Windows
          path: |
            apps/app/src-tauri/target/release/bundle/msi/*.msi
            apps/app/src-tauri/target/release/bundle/nsis/*.exe
