name: Build Desktop App
on:
  workflow_dispatch: # İstediğinde elinle çalıştırmak için
  schedule:
    - cron: '0 0 * * 3' # HER ÇARŞAMBA GECE YARISI otomatik olarak çalışır!

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Robotun kafasını karıştıran inatçı ayar dosyalarını fabrikadan temizliyoruz
      - name: Clear Rust Toolchain Overrides
        run: Get-ChildItem -Path . -Filter "rust-toolchain*" -Recurse | Remove-Item -Force
        shell: powershell

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal

      - name: Install Dependencies
        run: pnpm install

      - name: Build Application
        run: pnpm app:build

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Modrinth-Launcher-Windows
          path: |
            apps/app/src-tauri/target/release/bundle/msi/*.msi
            apps/app/src-tauri/target/release/bundle/nsis/*.exe
